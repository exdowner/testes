<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider-IO: Spaceship Pilot</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            z-index: 10;
        }
        kbd { background: #333; border: 1px solid #555; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        #loading { position: absolute; top: 10px; left: 10px; color: lime; font-family: monospace; }
    </style>
</head>
<body>

    <div id="loading">Carregando Nave...</div>
    <div id="instructions">
        <h1>PILOTE A NAVE</h1>
        <p>Mover: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></p>
        <p>Subir/Descer: <kbd>Espaço</kbd> | <kbd>Shift</kbd></p>
        <p>Girar: <kbd>Mouse</kbd></p>
        <button id="startBtn" style="padding:10px 20px; cursor:pointer;">DECOLAR</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCfdgkO3WzaxXT-djAA6MsLC2m26c9optU",
            authDomain: "slider-io.firebaseapp.com",
            databaseURL: "https://slider-io-default-rtdb.firebaseio.com",
            projectId: "slider-io",
            storageBucket: "slider-io.firebasestorage.app",
            messagingSenderId: "395647141464",
            appId: "1:395647141464:web:251cc58a3e0e90ca262c2d"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const postsRef = ref(db, 'posts');

        // --- CENA ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
        scene.add(light);

        // --- CARREGAR NAVE ---
        let spaceship;
        const loader = new GLTFLoader();
        loader.load('spaceship.glb', (gltf) => {
            spaceship = gltf.scene;

            // AJUSTE AUTOMÁTICO DE TAMANHO
            const box = new THREE.Box3().setFromObject(spaceship);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 5 / maxDim; // Ajusta para que a nave tenha 5 unidades de tamanho
            spaceship.scale.set(scale, scale, scale);
            
            scene.add(spaceship);
            document.getElementById('loading').style.display = 'none';
        }, undefined, (error) => {
            console.error("Erro ao carregar spaceship.glb. Verifique se o arquivo está na mesma pasta.", error);
        });

        // --- CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('startBtn').addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
        controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'block');

        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // Estrelas
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<10000; i++) starPos.push(THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000), THREE.MathUtils.randFloatSpread(5000));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 2 })));

        // --- POST-ITS (Firebase) ---
        onChildAdded(postsRef, (snapshot) => {
            const data = snapshot.val();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 256;
            ctx.fillStyle = data.color || '#ffff00';
            ctx.fillRect(0,0,256,256);
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText(data.text || '', 20, 100);
            
            const mesh = new THREE.Mesh(
                new THREE.PlaneGeometry(20, 20),
                new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), side: THREE.DoubleSide })
            );
            mesh.position.set(data.x, data.y, data.z);
            scene.add(mesh);
        });

        // --- LOOP ---
        const velocity = new THREE.Vector3();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked && spaceship) {
                const speed = 2.5;
                
                // Movimentação baseada na rotação da câmera
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
                if (keys['Space']) camera.position.y += speed;
                if (keys['ShiftLeft']) camera.position.y -= speed;

                // Faz a nave seguir a câmera (posicionada um pouco a frente/baixo)
                spaceship.position.copy(camera.position);
                spaceship.quaternion.copy(camera.quaternion);
                spaceship.translateZ(-15); // Coloca a nave na frente da câmera
                spaceship.translateY(-5);  // Ajusta altura da nave na tela
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
