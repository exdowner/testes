<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider-IO: Infinite Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #00ffff; pointer-events: none; z-index: 5; }
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: white; z-index: 100;
        }
        button { padding: 15px 40px; cursor: pointer; background: #00ffff; color: black; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">COORDENADAS: <span id="coords">0, 0, 0</span></div>
    
    <div id="instructions">
        <h1>SISTEMA OPERACIONAL ATIVO</h1>
        <p>W, A, S, D para pilotar | Scroll para Zoom</p>
        <button id="startBtn">INICIAR MOTORES</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // --- ESTRELAS DE FUNDO ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<30000; i++) starPos.push(THREE.MathUtils.randFloatSpread(10000), THREE.MathUtils.randFloatSpread(10000), THREE.MathUtils.randFloatSpread(10000));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 2 }));
        scene.add(stars);

        // --- CARREGAMENTO DA NAVE ---
        let spaceship = new THREE.Group(); // Começa como um grupo vazio para não dar erro
        const loader = new GLTFLoader();
        
        loader.load('spaceship.glb', 
            (gltf) => {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                model.scale.setScalar(4 / size);
                spaceship.add(model);
                console.log("Nave carregada com sucesso.");
            },
            undefined,
            () => {
                console.warn("spaceship.glb não encontrado. Usando nave de emergência.");
                const backupModel = new THREE.Mesh(new THREE.ConeGeometry(1, 4, 8), new THREE.MeshBasicMaterial({color: 0x00ffff, wireframe: true}));
                backupModel.rotation.x = Math.PI / 2;
                spaceship.add(backupModel);
            }
        );
        scene.add(spaceship);

        // --- CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('startBtn').addEventListener('click', () => {
            controls.lock();
            document.getElementById('instructions').style.display = 'none';
        });

        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- ZOOM E RASTRO ---
        let zoomDist = 5;
        window.addEventListener('wheel', (e) => zoomDist = THREE.MathUtils.clamp(zoomDist + e.deltaY * 0.01, 1, 40));

        const trails = [];
        function createTrail() {
            const geo = new THREE.SphereGeometry(0.15, 6, 6);
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
            const p = new THREE.Mesh(geo, mat);
            p.position.copy(spaceship.position);
            scene.add(p);
            trails.push({ mesh: p, life: 1.0 });
        }

        const shootingStars = [];
        function createShootingStar() {
            const geo = new THREE.BoxGeometry(0.5, 0.5, 20);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const s = new THREE.Mesh(geo, mat);
            s.position.set(camera.position.x + THREE.MathUtils.randFloatSpread(2000), camera.position.y + THREE.MathUtils.randFloatSpread(2000), camera.position.z - 2000);
            scene.add(s);
            shootingStars.push(s);
        }

        // --- LOOP PRINCIPAL ---
        let velocity = 0;
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                // 1. Movimento
                const accel = keys['KeyW'] ? 1.5 : (keys['KeyS'] ? -1.0 : 0);
                velocity = THREE.MathUtils.lerp(velocity, accel, 0.05);
                
                controls.moveForward(velocity);
                if (keys['KeyA']) controls.moveRight(-1.5);
                if (keys['KeyD']) controls.moveRight(1.5);
                if (keys['Space']) camera.position.y += 1.5;
                if (keys['ShiftLeft']) camera.position.y -= 1.5;

                // 2. Nave segue Câmera
                spaceship.position.copy(camera.position);
                spaceship.quaternion.copy(camera.quaternion);
                spaceship.translateZ(-zoomDist);
                spaceship.translateY(-zoomDist * 0.2);

                // 3. Efeitos
                if (Math.abs(velocity) > 0.1) createTrail();
                if (Math.random() < 0.05) createShootingStar();

                // Atualizar Rastro
                for(let i=trails.length-1; i>=0; i--) {
                    trails[i].life -= 0.02;
                    trails[i].mesh.material.opacity = trails[i].life;
                    trails[i].mesh.scale.setScalar(trails[i].life);
                    if(trails[i].life <= 0) {
                        scene.remove(trails[i].mesh);
                        trails.splice(i, 1);
                    }
                }

                // Atualizar Estrelas Cadentes
                shootingStars.forEach((s, i) => {
                    s.translateZ(50);
                    if (s.position.distanceTo(camera.position) > 4000) {
                        scene.remove(s);
                        shootingStars.splice(i, 1);
                    }
                });

                stars.position.copy(camera.position);
                document.getElementById('coords').innerText = `${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
