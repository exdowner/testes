<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider-IO: Infinite Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #00ffff; pointer-events: none; text-shadow: 0 0 5px #00ffff; z-index: 5; }
        
        /* Menu de Início corrigido */
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: white; z-index: 100;
        }
        button { 
            padding: 15px 40px; cursor: pointer; background: #00ffff; color: black; 
            border: none; font-weight: bold; font-size: 1.2rem; border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background: #fff; transform: scale(1.1); }
        kbd { background: #333; padding: 2px 5px; border-radius: 3px; color: #00ffff; }
    </style>
</head>
<body>

    <div id="ui">
        COORDENADAS: <span id="coords">0, 0, 0</span><br>
        DISTÂNCIA DA NAVE: <span id="zoomVal">1</span>
    </div>
    
    <div id="instructions" id="menu">
        <h1>UNIVERSO INFINITO</h1>
        <p><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> - Pilotar</p>
        <p><kbd>SCROLL</kbd> - Ajustar Câmera</p>
        <br>
        <button id="startBtn">DECOLAR</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0012);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 15000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const pointLight = new THREE.PointLight(0x00ffff, 2, 100);
        scene.add(pointLight);

        // --- ESTRELAS PROCEDURAIS ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<20000; i++) starPos.push(THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000), THREE.MathUtils.randFloatSpread(6000));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.5 }));
        scene.add(stars);

        // --- NAVE ---
        let spaceship;
        let zoomDistance = 1.5; // Câmera colada (perto do 1)
        let targetZoom = 1.5;
        const loader = new GLTFLoader();

        loader.load('spaceship.glb', (gltf) => {
            spaceship = gltf.scene;
            const box = new THREE.Box3().setFromObject(spaceship);
            const size = box.getSize(new THREE.Vector3()).length();
            const scale = 3 / size;
            spaceship.scale.set(scale, scale, scale);
            scene.add(spaceship);
        });

        // --- CONTROLES E CLIQUE ---
        const controls = new PointerLockControls(camera, document.body);
        const menu = document.getElementById('instructions');
        const startBtn = document.getElementById('startBtn');

        startBtn.addEventListener('click', () => {
            controls.lock();
            menu.style.display = 'none'; // Garante que some no clique
        });

        controls.addEventListener('unlock', () => {
            menu.style.display = 'flex';
        });

        window.addEventListener('wheel', (e) => {
            targetZoom = THREE.MathUtils.clamp(targetZoom + e.deltaY * 0.01, 0.5, 30);
            document.getElementById('zoomVal').innerText = targetZoom.toFixed(1);
        });

        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- ESTRELAS CADENTES ---
        const shootingStars = [];
        function createShootingStar() {
            const geo = new THREE.SphereGeometry(0.2, 4, 4);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const s = new THREE.Mesh(geo, mat);
            s.position.set(camera.position.x + THREE.MathUtils.randFloatSpread(1000), camera.position.y + THREE.MathUtils.randFloatSpread(1000), camera.position.z - 1000);
            scene.add(s);
            shootingStars.push({ mesh: s, life: 1.0 });
        }

        // --- LOOP ---
        const velocity = new THREE.Vector3();
        function animate() {
            requestAnimationFrame(animate);

            if (spaceship && controls.isLocked) {
                // Movimento
                const speed = keys['KeyW'] ? 5.0 : (keys['KeyS'] ? -2.5 : 0);
                velocity.z = THREE.MathUtils.lerp(velocity.z, speed, 0.05);
                
                controls.moveForward(velocity.z);
                if (keys['KeyA']) controls.moveRight(-2);
                if (keys['KeyD']) controls.moveRight(2);
                if (keys['Space']) camera.position.y += 2;
                if (keys['ShiftLeft']) camera.position.y -= 2;

                // Nave segue a câmera (Visão Cockpit/Close-up)
                spaceship.position.copy(camera.position);
                spaceship.quaternion.copy(camera.quaternion);
                
                zoomDistance = THREE.MathUtils.lerp(zoomDistance, targetZoom, 0.1);
                spaceship.translateZ(-zoomDistance); // Distância ajustada pelo zoom
                spaceship.translateY(-zoomDistance * 0.3); // Ajuste de altura da nave

                // Infinito
                stars.position.copy(camera.position);
                pointLight.position.copy(spaceship.position);

                if(Math.random() < 0.03) createShootingStar();
                shootingStars.forEach((s, i) => {
                    s.mesh.translateZ(40);
                    s.life -= 0.01;
                    if(s.life <= 0) { scene.remove(s.mesh); shootingStars.splice(i, 1); }
                });

                document.getElementById('coords').innerText = `${Math.round(camera.position.x)}, ${Math.round(camera.position.y)}, ${Math.round(camera.position.z)}`;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
