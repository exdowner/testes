<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider-IO: HyperSpeed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #00ffff; pointer-events: none; z-index: 5; text-shadow: 0 0 8px #00ffff;}
        #instructions {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); color: white; z-index: 100;
        }
        button { padding: 15px 40px; cursor: pointer; background: #00ffff; color: black; border: none; font-weight: bold; font-size: 1.2em; border-radius: 5px; }
        button:hover { background: #fff; box-shadow: 0 0 20px #00ffff; }
    </style>
</head>
<body>

    <div id="ui">VELOCIDADE: <span id="speedDisplay">0</span> LY/h</div>
    
    <div id="instructions">
        <h1 style="color:#00ffff; letter-spacing: 5px;">WARP DRIVE</h1>
        <p>Segure <kbd>W</kbd> para acelerar e sentir a velocidade</p>
        <button id="startBtn">INICIAR SALTO</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        const scene = new THREE.Scene();
        // Neblina preta esconde o "fim" do cenário
        scene.fog = new THREE.FogExp2(0x000000, 0.0005);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 30000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // --- POEIRA ESTELAR (Para sensação de movimento) ---
        // Criamos estrelas em um volume imenso, mas fixas no espaço
        const starCount = 40000;
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<starCount; i++) {
            starPos.push(
                THREE.MathUtils.randFloatSpread(10000), 
                THREE.MathUtils.randFloatSpread(10000), 
                THREE.MathUtils.randFloatSpread(10000)
            );
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 3, sizeAttenuation: true }));
        scene.add(stars);

        // --- NAVE ---
        let spaceship = new THREE.Group();
        const loader = new GLTFLoader();
        loader.load('spaceship.glb', (gltf) => {
            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3()).length();
            model.scale.setScalar(5 / size);
            spaceship.add(model);
        }, undefined, () => {
            // Backup se não achar o arquivo
            const backup = new THREE.Mesh(new THREE.ConeGeometry(1, 4, 8), new THREE.MeshBasicMaterial({color: 0x00ffff, wireframe: true}));
            backup.rotation.x = Math.PI/2;
            spaceship.add(backup);
        });
        scene.add(spaceship);

        // --- CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('startBtn').addEventListener('click', () => {
            controls.lock();
            document.getElementById('instructions').style.display = 'none';
        });

        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- RASTRO E ZOOM ---
        let zoomDist = 2.5; 
        const trails = [];
        function createTrail() {
            const p = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 2), 
                new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true })
            );
            p.position.copy(spaceship.position);
            p.quaternion.copy(spaceship.quaternion);
            p.translateZ(2); // Atrás da nave
            scene.add(p);
            trails.push({ mesh: p, life: 1.0 });
        }

        // --- ESTRELAS CADENTES ---
        const shootingStars = [];
        function createShootingStar() {
            const geo = new THREE.CapsuleGeometry(0.1, 50, 4, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const s = new THREE.Mesh(geo, mat);
            // Spawna na frente do jogador
            const offset = new THREE.Vector3(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), -2000);
            offset.applyQuaternion(camera.quaternion);
            s.position.copy(camera.position).add(offset);
            s.lookAt(camera.position);
            scene.add(s);
            shootingStars.push(s);
        }

        // --- LOOP PRINCIPAL ---
        let velocity = 0;
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                // Aceleração progressiva
                const targetSpeed = keys['KeyW'] ? 8.0 : (keys['KeyS'] ? -4.0 : 0);
                velocity = THREE.MathUtils.lerp(velocity, targetSpeed, 0.02);
                
                controls.moveForward(velocity);
                if (keys['KeyA']) controls.moveRight(-3);
                if (keys['KeyD']) controls.moveRight(3);
                if (keys['Space']) camera.position.y += 3;
                if (keys['ShiftLeft']) camera.position.y -= 3;

                // Nave colada na câmera
                spaceship.position.copy(camera.position);
                spaceship.quaternion.copy(camera.quaternion);
                spaceship.translateZ(-zoomDist);
                spaceship.translateY(-0.8);

                // Efeito visual de rastro ao mover
                if (Math.abs(velocity) > 0.5) {
                    createTrail();
                }

                // Estrelas cadentes aleatórias
                if (Math.random() < 0.05) createShootingStar();

                // Atualizar partículas de rastro
                for(let i=trails.length-1; i>=0; i--) {
                    trails[i].life -= 0.03;
                    trails[i].mesh.material.opacity = trails[i].life;
                    if(trails[i].life <= 0) {
                        scene.remove(trails[i].mesh);
                        trails.splice(i, 1);
                    }
                }

                // Mover estrelas cadentes super rápido
                for(let i=shootingStars.length-1; i>=0; i--) {
                    shootingStars[i].translateZ(100);
                    if(shootingStars[i].position.distanceTo(camera.position) > 5000) {
                        scene.remove(shootingStars[i]);
                        shootingStars.splice(i, 1);
                    }
                }

                document.getElementById('speedDisplay').innerText = Math.abs(Math.round(velocity * 100));
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
